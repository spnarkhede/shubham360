name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build size
        run: |
          echo "Build folder size:"
          du -sh build/
          
      - name: Upload build artifacts
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 7

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for console statements
        run: |
          echo "Checking for console.log statements..."
          ! grep -r "console\.log" src/ || echo "Found console statements (warning only)"

      - name: Check file structure
        run: |
          echo "Verifying project structure..."
          test -d src/pages && echo "✓ Pages directory exists"
          test -d src/components && echo "✓ Components directory exists"
          test -d src/config && echo "✓ Config directory exists"
          test -d src/hooks && echo "✓ Hooks directory exists"
          test -d docs && echo "✓ Docs directory exists"
          test -d blog && echo "✓ Blog directory exists"

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run npm audit
        run: npm audit --production --audit-level=moderate || echo "Security audit completed with warnings"

      - name: Check for exposed secrets
        run: |
          echo "Checking for potential secrets..."
          ! grep -r "API_KEY\|SECRET\|PASSWORD" src/ || echo "Potential secrets found (please review)"
