name: Greet First-Time Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Greet First-Time Contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Hello @${{ github.actor }}!
            
            Thank you for opening your first issue in this repository! 🎉
            
            I appreciate you taking the time to contribute. Your feedback helps make this project better.
            
            I'll review your issue as soon as possible. In the meantime, please ensure you've provided all the necessary details to help me understand and address your concern.
            
            Feel free to check out the [Contributing Guide](https://github.com/spnarkhede/shubham360/blob/main/CONTRIBUTING.md) if you haven't already.
            
            Thanks again! 🙏
          pr-message: |
            👋 Hello @${{ github.actor }}!
            
            Thank you for opening your first pull request in this repository! 🎉
            
            I really appreciate your contribution. I'll review your changes as soon as possible.
            
            Please make sure:
            - ✅ Your code follows the project's style guidelines
            - ✅ You've tested your changes in both dark and light modes
            - ✅ All checklist items in the PR template are completed
            
            Looking forward to working with you! 🚀
